version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: db

    command: --default-time-zone=+07:00

    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: jobportaldb
      MYSQL_USER: jobportal
      MYSQL_PASSWORD: 12345
      TZ: Asia/Ho_Chi_Minh

    ports:
      - '3307:3306'

    volumes:
      - db_data:/var/lib/mysql

      # Run schema and sql seed
      - ./backend/db:/docker-entrypoint-initdb.d

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: backend

    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

    container_name: jobportal-backend

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8080:8080"

  frontend:
    build: frontend

    container_name: jobportal-frontend

    depends_on:
      - backend

    ports:
      - "5173:80"

volumes:
  db_data: